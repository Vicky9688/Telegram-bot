<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .box { fill:#f5f5f5; stroke:#aaa; }
      .label { font-size:13px; font-weight:600; fill:#222; }
      .sub { font-size:11px; fill:#555; }
      .arr { stroke:#999; stroke-width:1.2; fill:none; }
      .container { fill:none; stroke-dasharray:5 3; stroke-width:1; }
      .teal { fill:#e1f5ee; stroke:#1D9E75; }
      .purple { fill:#EEEDFE; stroke:#534AB7; }
      .blue { fill:#E6F1FB; stroke:#185FA5; }
      .coral { fill:#FAECE7; stroke:#993C1D; }
      .amber { fill:#FAEEDA; stroke:#854F0B; }
      .green { fill:#EAF3DE; stroke:#3B6D11; }
      .gray { fill:#F1EFE8; stroke:#5F5E5A; }
    </style>
  </defs>

  <!-- Telegram User -->
  <rect x="260" y="20" width="160" height="44" rx="8" class="box teal"/>
  <text class="label" x="340" y="40" text-anchor="middle">Telegram user</text>
  <text class="sub" x="340" y="58" text-anchor="middle">sends /ask or /image</text>
  <line x1="340" y1="64" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

  <!-- App.py handler -->
  <rect x="210" y="100" width="260" height="44" rx="8" class="box purple"/>
  <text class="label" x="340" y="120" text-anchor="middle">app.py — Bot handler</text>
  <text class="sub" x="340" y="136" text-anchor="middle">python-telegram-bot</text>

  <!-- Cache check arrow -->
  <path d="M210 122 L140 122" class="arr" marker-end="url(#arrow)"/>
  <text class="sub" x="170" y="115" text-anchor="middle">cache?</text>
  <rect x="40" y="100" width="100" height="44" rx="8" class="box gray"/>
  <text class="label" x="90" y="120" text-anchor="middle">Cache</text>
  <text class="sub" x="90" y="136" text-anchor="middle">SQLite+MD5</text>
  <path d="M90 100 L90 56 L260 56" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="sub" x="155" y="48" text-anchor="middle">hit → return</text>

  <!-- Branch /ask -->
  <path d="M280 144 L200 144 L200 220" class="arr" marker-end="url(#arrow)"/>
  <text class="sub" x="228" y="193" text-anchor="middle">/ask</text>
  <!-- Branch /image -->
  <path d="M400 144 L480 144 L480 220" class="arr" marker-end="url(#arrow)"/>
  <text class="sub" x="452" y="193" text-anchor="middle">/image</text>

  <!-- RAG pipeline container -->
  <rect x="40" y="220" width="320" height="310" rx="14" class="container" stroke="#185FA5"/>
  <text class="label" x="200" y="248" text-anchor="middle" fill="#185FA5">RAG pipeline</text>

  <rect x="60" y="262" width="260" height="56" rx="8" class="box blue"/>
  <text class="label" x="190" y="283" text-anchor="middle">embedder.py</text>
  <text class="sub" x="190" y="300" text-anchor="middle">chunk → all-MiniLM-L6-v2 → SQLite</text>
  <line x1="190" y1="318" x2="190" y2="350" class="arr" marker-end="url(#arrow)"/>

  <rect x="60" y="350" width="260" height="56" rx="8" class="box blue"/>
  <text class="label" x="190" y="371" text-anchor="middle">retriever.py</text>
  <text class="sub" x="190" y="388" text-anchor="middle">cosine sim → top-3 chunks</text>
  <line x1="190" y1="406" x2="190" y2="438" class="arr" marker-end="url(#arrow)"/>

  <rect x="60" y="438" width="260" height="56" rx="8" class="box blue"/>
  <text class="label" x="190" y="459" text-anchor="middle">Ollama — Mistral 7B</text>
  <text class="sub" x="190" y="476" text-anchor="middle">prompt + context → answer</text>

  <!-- Vision pipeline container -->
  <rect x="380" y="220" width="260" height="180" rx="14" class="container" stroke="#993C1D"/>
  <text class="label" x="510" y="248" text-anchor="middle" fill="#993C1D">Vision pipeline</text>

  <rect x="400" y="262" width="220" height="56" rx="8" class="box coral"/>
  <text class="label" x="510" y="283" text-anchor="middle">captioner.py</text>
  <text class="sub" x="510" y="300" text-anchor="middle">BLIP-base (Salesforce)</text>
  <line x1="510" y1="318" x2="510" y2="350" class="arr" marker-end="url(#arrow)"/>

  <rect x="400" y="350" width="220" height="44" rx="8" class="box coral"/>
  <text class="label" x="510" y="368" text-anchor="middle">Tag extractor</text>
  <text class="sub" x="510" y="385" text-anchor="middle">stopword filter → 3 tags</text>

  <!-- Utilities row -->
  <text class="label" x="340" y="570" text-anchor="middle">Shared utilities</text>
  <rect x="60" y="584" width="175" height="56" rx="8" class="box amber"/>
  <text class="label" x="147" y="604" text-anchor="middle">history.py</text>
  <text class="sub" x="147" y="621" text-anchor="middle">deque — last 3 per user</text>

  <rect x="252" y="584" width="176" height="56" rx="8" class="box green"/>
  <text class="label" x="340" y="604" text-anchor="middle">Knowledge base</text>
  <text class="sub" x="340" y="621" text-anchor="middle">5 × .md docs</text>

  <rect x="445" y="584" width="175" height="56" rx="8" class="box gray"/>
  <text class="label" x="532" y="604" text-anchor="middle">cache.py</text>
  <text class="sub" x="532" y="621" text-anchor="middle">hash → answer</text>

  <!-- Response back to user -->
  <line x1="190" y1="494" x2="190" y2="660" class="arr" stroke="#999"/>
  <line x1="510" y1="394" x2="510" y2="660" class="arr" stroke="#999"/>
  <path d="M190 660 L510 660" class="arr"/>
  <line x1="340" y1="660" x2="340" y2="695" class="arr" marker-end="url(#arrow)"/>

  <rect x="210" y="695" width="260" height="20" rx="6" class="box teal"/>
  <text class="sub" x="340" y="709" text-anchor="middle">answer + source + tags → user</text>
</svg>
